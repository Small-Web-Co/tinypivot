# Build and pack npm publish artifacts without attempting a real publish.
name: Publish Dry Run

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test:unit

  pack:
    name: Build and Pack
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Show publish tool versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Build all packages
        run: pnpm build

      - name: Pack publish artifacts
        run: |
          mkdir -p "${RUNNER_TEMP}/npm-packages"

          cd packages/core
          pnpm pack --pack-destination "${RUNNER_TEMP}/npm-packages"

          cd ../server
          pnpm pack --pack-destination "${RUNNER_TEMP}/npm-packages"

          cd ../vue
          pnpm pack --pack-destination "${RUNNER_TEMP}/npm-packages"

          cd ../react
          pnpm pack --pack-destination "${RUNNER_TEMP}/npm-packages"

      - name: List publish artifacts
        run: ls -1 "${RUNNER_TEMP}/npm-packages"

      - name: Upload publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages-dry-run
          path: ${{ runner.temp }}/npm-packages
