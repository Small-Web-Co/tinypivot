# Publish packages to npm using Trusted Publishing (OIDC)
name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (skip actual publish)
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  # Run quality checks before publishing
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test:unit

  # Publish only after quality checks pass
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # npm trusted publishing requires Node 22.14+ and npm 11.5.1+
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Show publish tool versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Build all packages
        run: pnpm build

      - name: Pack publish artifacts
        run: |
          mkdir -p "${RUNNER_TEMP}/npm-packages"

          cd packages/core
          pnpm pack --pack-destination "${RUNNER_TEMP}/npm-packages"

          cd ../server
          pnpm pack --pack-destination "${RUNNER_TEMP}/npm-packages"

          cd ../vue
          pnpm pack --pack-destination "${RUNNER_TEMP}/npm-packages"

          cd ../react
          pnpm pack --pack-destination "${RUNNER_TEMP}/npm-packages"

      - name: List publish artifacts
        run: ls -1 "${RUNNER_TEMP}/npm-packages"

      - name: Publish @smallwebco/tinypivot-core with OIDC
        if: ${{ inputs.dry_run != 'true' }}
        run: npm publish "${RUNNER_TEMP}"/npm-packages/smallwebco-tinypivot-core-*.tgz --access public

      - name: Publish @smallwebco/tinypivot-server with OIDC
        if: ${{ inputs.dry_run != 'true' }}
        run: npm publish "${RUNNER_TEMP}"/npm-packages/smallwebco-tinypivot-server-*.tgz --access public

      - name: Publish @smallwebco/tinypivot-vue with OIDC
        if: ${{ inputs.dry_run != 'true' }}
        run: npm publish "${RUNNER_TEMP}"/npm-packages/smallwebco-tinypivot-vue-*.tgz --access public

      - name: Publish @smallwebco/tinypivot-react with OIDC
        if: ${{ inputs.dry_run != 'true' }}
        run: npm publish "${RUNNER_TEMP}"/npm-packages/smallwebco-tinypivot-react-*.tgz --access public

      - name: Dry run summary
        if: ${{ inputs.dry_run == 'true' }}
        run: |
          echo "Dry run complete - packages built and packed but not published"
          echo "Packages that would be published:"
          echo "  - @smallwebco/tinypivot-core"
          echo "  - @smallwebco/tinypivot-server"
          echo "  - @smallwebco/tinypivot-vue"
          echo "  - @smallwebco/tinypivot-react"
