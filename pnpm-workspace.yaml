shellEmulator: true

trustPolicy: no-downgrade

packages:
  - 'packages/*'
  - 'examples/*'
  - '!examples/stackblitz-react'
  - '!examples/stackblitz-vue'
overrides:
  esbuild: '>=0.25.0'
  js-cookie: '>=3.0.7'
  lodash: '>=4.18.0'
  minimatch: '>=9.0.7'
  path-to-regexp: '>=0.1.13'
  picomatch: '>=4.0.4'
  qs: '>=6.14.1'
  rollup: '>=4.59.0'
  shell-quote: '>=1.8.4'
  undici: '>=6.24.0'
